<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KoreX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0e1621;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .phone {
            width: 100vw;
            height: 100vh;
            background: #17212b;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            background: #17212b;
            border-bottom: 1px solid #2b3a4b;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #3f8cff, #1f5fd9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 20px;
        }
        .header-name {
            font-size: 0;
        }
        .header-name::before {
            content: "KoreX";
            background: linear-gradient(135deg, #7bb3ff, #3f8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 20px;
            font-weight: 800;
        }
        .header-status {
            color: #76b0e8;
            font-size: 13px;
        }
        .header-actions {
            display: flex;
            gap: 18px;
            color: #7b96b8;
            font-size: 20px;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
            background: #17212b;
        }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 1px solid #1e2b36;
            cursor: pointer;
        }
        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #2b3a4b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #cbdae9;
            flex-shrink: 0;
            margin-right: 14px;
        }
        .chat-avatar.c1 { background: #3f8cff; color: white; }
        .chat-avatar.c2 { background: #7b5cbf; color: white; }
        .chat-avatar.c3 { background: #e47a4a; color: white; }
        .chat-avatar.channel { background: #e8a838; color: white; }
        
        .chat-info { flex: 1; min-width: 0; }
        .chat-name {
            color: #f0f5fa;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
        }
        .chat-name span:last-child {
            font-weight: 400;
            font-size: 13px;
            color: #7b96b8;
        }
        .chat-preview {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #8ca3c0;
            margin-top: 2px;
        }
        .badge {
            background: #3f8cff;
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 9px;
            border-radius: 30px;
        }
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 14px 16px;
            background: #17212b;
            border-top: 1px solid #2b3a4b;
            color: #5f7c9c;
            font-size: 22px;
        }
        .bottom-nav .active { color: #3f8cff; }
        .floating-add {
            position: absolute;
            bottom: 90px;
            right: 20px;
            background: #3f8cff;
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 6px 20px rgba(63, 140, 255, 0.4);
            cursor: pointer;
            z-index: 10;
        }
        .chat-window {
            display: none;
            flex-direction: column;
            flex: 1;
            background: #17212b;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 20;
        }
        .chat-window.active { display: flex; }
        .chat-window-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #17212b;
            border-bottom: 1px solid #2b3a4b;
        }
        .back-btn {
            color: #7b96b8;
            font-size: 22px;
            margin-right: 14px;
            cursor: pointer;
        }
        .chat-user {
            font-weight: 700;
            font-size: 18px;
            color: #f0f5fa;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            background: #2b3a4b;
            color: #e0e9f5;
            align-self: flex-start;
        }
        .message.out {
            align-self: flex-end;
            background: #3f8cff;
            color: white;
        }
        .message.system {
            align-self: center;
            background: #1e2b36;
            color: #8ca3c0;
            font-size: 13px;
            padding: 6px 16px;
            border-radius: 30px;
        }
        .chat-input-area {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background: #17212b;
            border-top: 1px solid #2b3a4b;
            gap: 12px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 30px;
            border: none;
            background: #1e2b36;
            color: #f0f5fa;
            font-size: 15px;
            outline: none;
        }
        .send-btn {
            background: #3f8cff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            cursor: pointer;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #1e2b36;
            padding: 28px 24px;
            border-radius: 28px;
            width: 90%;
            max-width: 360px;
            color: #f0f5fa;
        }
        .modal-box h3 { text-align: center; margin-bottom: 16px; }
        .modal-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 30px;
            border: none;
            background: #0e1621;
            color: #f0f5fa;
            font-size: 15px;
            outline: none;
            margin-bottom: 12px;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .modal-actions button {
            padding: 10px 24px;
            border-radius: 30px;
            border: none;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
        }
        .btn-cancel { background: #2b3a4b; color: #a3b3c9; }
        .btn-confirm { background: #3f8cff; color: white; }
        
        .settings-panel {
            display: none;
            position: fixed;
            top: 0; right: 0;
            width: 300px;
            height: 100%;
            background: #1e2b36;
            z-index: 50;
            padding: 24px 20px;
            flex-direction: column;
            gap: 16px;
        }
        .settings-panel.active { display: flex; }
        .settings-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1a2632;
            color: #cbdae9;
            cursor: pointer;
        }
        .settings-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 45;
        }
        .settings-overlay.active { display: block; }
    </style>
</head>
<body>

<div class="phone">
    <!-- Шапка -->
    <div class="header">
        <div class="header-left">
            <div class="avatar"><i class="fas fa-paper-plane"></i></div>
            <div>
                <div class="header-name"></div>
                <div class="header-status">онлайн</div>
            </div>
        </div>
        <div class="header-actions">
            <i class="fas fa-search"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </div>

    <div class="main-content">
        <!-- Список чатов -->
        <div class="chat-list" id="chatList">
            <div class="chat-item" id="generalChat">
                <div class="chat-avatar channel"><i class="fas fa-hashtag"></i></div>
                <div class="chat-info">
                    <div class="chat-name"><span># Общий чат</span><span id="generalTime"></span></div>
                    <div class="chat-preview"><span id="generalPreview">Добро пожаловать в KoreX!</span><span class="badge" id="generalBadge">0</span></div>
                </div>
            </div>
            <div class="chat-item" data-chat="alex">
                <div class="chat-avatar c1"><i class="fas fa-user"></i></div>
                <div class="chat-info">
                    <div class="chat-name"><span>Алексей</span><span>13:42</span></div>
                    <div class="chat-preview"><span>Привет!</span></div>
                </div>
            </div>
            <div class="chat-item" data-chat="katya">
                <div class="chat-avatar c2"><i class="fas fa-user"></i></div>
                <div class="chat-info">
                    <div class="chat-name"><span>Екатерина</span><span>вчера</span></div>
                    <div class="chat-preview"><span>Как дела?</span></div>
                </div>
            </div>
        </div>

        <!-- Окно чата -->
        <div class="chat-window" id="chatWindow">
            <div class="chat-window-header">
                <span class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></span>
                <span class="chat-user" id="chatUserName">Общий чат</span>
            </div>
            <div class="messages-area" id="messagesArea">
                <div class="message system">📢 Добро пожаловать в KoreX!</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="msgInput" placeholder="Сообщение...">
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <div class="floating-add" id="addChatBtn"><i class="fas fa-plus"></i></div>
    </div>

    <div class="bottom-nav">
        <i class="fas fa-list-ul active"></i>
        <i class="fas fa-users"></i>
        <i class="fas fa-phone-alt"></i>
        <i class="fas fa-cog" id="navSettings"></i>
    </div>
</div>

<!-- Модалка -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <h3>Новый чат</h3>
        <input type="text" id="newChatName" placeholder="Название...">
        <div class="modal-actions">
            <button class="btn-cancel" id="modalCancel">Отмена</button>
            <button class="btn-confirm" id="modalConfirm">Создать</button>
        </div>
    </div>
</div>

<!-- Настройки -->
<div class="settings-overlay" id="settingsOverlay"></div>
<div class="settings-panel" id="settingsPanel">
    <h3>Настройки</h3>
    <div class="settings-item" id="clearChats">🗑️ Очистить чаты</div>
    <div class="settings-item" id="aboutKorex">ℹ️ О KoreX</div>
</div>

<!-- Font Awesome -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>

<script>
    // ===== ВСЁ В ОДНОМ ФАЙЛЕ =====
    
    // DOM
    const chatList = document.getElementById('chatList');
    const chatWindow = document.getElementById('chatWindow');
    const messagesArea = document.getElementById('messagesArea');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const backBtn = document.getElementById('backBtn');
    const addChatBtn = document.getElementById('addChatBtn');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalCancel = document.getElementById('modalCancel');
    const modalConfirm = document.getElementById('modalConfirm');
    const newChatName = document.getElementById('newChatName');
    const settingsPanel = document.getElementById('settingsPanel');
    const settingsOverlay = document.getElementById('settingsOverlay');
    const navSettings = document.getElementById('navSettings');
    const generalPreview = document.getElementById('generalPreview');
    const generalBadge = document.getElementById('generalBadge');
    
    let currentChat = 'general';
    let chatCount = 0;
    
    // Открыть чат
    function openChat(name, isGeneral = false) {
        document.getElementById('chatUserName').textContent = name;
        chatWindow.classList.add('active');
        if (isGeneral) {
            messagesArea.innerHTML = `
                <div class="message system">📢 Общий чат KoreX</div>
                <div class="message">Привет! Это общий чат</div>
            `;
        }
    }
    
    // Закрыть чат
    function closeChat() {
        chatWindow.classList.remove('active');
    }
    
    // Отправить сообщение
    function sendMessage() {
        const text = msgInput.value.trim();
        if (!text) return;
        
        const now = new Date();
        const time = now.getHours().toString().padStart(2,'0') + ':' + 
                    now.getMinutes().toString().padStart(2,'0');
        
        const msg = document.createElement('div');
        msg.className = 'message out';
        msg.innerHTML = text + `<div style="font-size:10px;opacity:0.6;margin-top:4px">${time}</div>`;
        messagesArea.appendChild(msg);
        messagesArea.scrollTop = messagesArea.scrollHeight;
        msgInput.value = '';
        
        // Обновляем превью общего чата
        generalPreview.textContent = text.length > 20 ? text.substring(0,20) + '...' : text;
        document.getElementById('generalTime').textContent = time;
        const badge = document.getElementById('generalBadge');
        badge.textContent = parseInt(badge.textContent) + 1;
    }
    
    // События
    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    backBtn.addEventListener('click', closeChat);
    
    // Общий чат
    document.getElementById('generalChat').addEventListener('click', function() {
        openChat('Общий чат', true);
        document.getElementById('generalBadge').textContent = '0';
    });
    
    // Другие чаты
    document.querySelectorAll('.chat-item[data-chat]').forEach(item => {
        item.addEventListener('click', function() {
            const name = this.querySelector('.chat-name span').textContent;
            openChat(name);
        });
    });
    
    // Добавить чат
    addChatBtn.addEventListener('click', () => {
        modalOverlay.classList.add('active');
        newChatName.value = '';
        newChatName.focus();
    });
    
    modalCancel.addEventListener('click', () => modalOverlay.classList.remove('active'));
    modalConfirm.addEventListener('click', () => {
        const name = newChatName.value.trim();
        if (!name) return;
        
        chatCount++;
        const colors = ['c1','c2','c3'];
        const color = colors[chatCount % 3];
        
        const item = document.createElement('div');
        item.className = 'chat-item';
        item.dataset.chat = 'chat_' + Date.now();
        item.innerHTML = `
            <div class="chat-avatar ${color}"><i class="fas fa-user"></i></div>
            <div class="chat-info">
                <div class="chat-name"><span>${name}</span><span>сейчас</span></div>
                <div class="chat-preview"><span>Новый чат</span></div>
            </div>
        `;
        item.addEventListener('click', function() {
            openChat(name);
        });
        chatList.appendChild(item);
        modalOverlay.classList.remove('active');
    });
    
    // Настройки
    navSettings.addEventListener('click', () => {
        settingsPanel.classList.toggle('active');
        settingsOverlay.classList.toggle('active');
    });
    
    settingsOverlay.addEventListener('click', () => {
        settingsPanel.classList.remove('active');
        settingsOverlay.classList.remove('active');
    });
    
    document.getElementById('clearChats').addEventListener('click', () => {
        if (confirm('Очистить все чаты?')) {
            const items = chatList.querySelectorAll('.chat-item[data-chat]');
            items.forEach(el => el.remove());
            settingsPanel.classList.remove('active');
            settingsOverlay.classList.remove('active');
        }
    });
    
    document.getElementById('aboutKorex').addEventListener('click', () => {
        alert('KoreX v2.0\nЗащищённый мессенджер\n\nСделано с ❤️');
        settingsPanel.classList.remove('active');
        settingsOverlay.classList.remove('active');
    });
    
    // Нижняя навигация
    document.querySelectorAll('.bottom-nav i').forEach(el => {
        el.addEventListener('click', function() {
            document.querySelectorAll('.bottom-nav i').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            closeChat();
        });
    });
    
    // Закрыть чат при клике на навигацию
    console.log('✅ KoreX работает!');
</script>

</body>
</html>
