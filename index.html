<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KoreX · мессенджер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="phone" id="app">
    <!-- ШАПКА -->
    <div class="header">
        <div class="header-left">
            <div class="avatar" id="avatarBtn"><i class="fas fa-paper-plane"></i></div>
            <div class="header-info">
                <div class="header-name"></div>
                <div class="header-status" id="connectionStatus">
                    <i class="fas fa-circle" style="color: #4cd964; font-size: 10px;"></i>
                    <span id="statusText">онлайн</span>
                </div>
            </div>
        </div>
        <div class="header-actions">
            <i class="fas fa-search" id="searchBtn"></i>
            <i class="fas fa-ellipsis-v" id="menuBtn"></i>
        </div>
    </div>

    <div class="main-content">
        <!-- Список чатов -->
        <div class="chat-list" id="chatList">
            <!-- Общий чат (всегда первый) -->
            <div class="chat-item" data-chat="general" id="generalChat">
                <div class="chat-avatar channel"><i class="fas fa-hashtag"></i></div>
                <div class="chat-info">
                    <div class="chat-name"><span># Общий чат</span><span id="generalTime"></span></div>
                    <div class="chat-preview"><span class="msg-text" id="generalPreview">Добро пожаловать в KoreX!</span><span class="badge channel-badge" id="generalBadge">0</span></div>
                </div>
            </div>
        </div>

        <!-- Окно чата -->
        <div class="chat-window" id="chatWindow">
            <div class="chat-window-header">
                <span class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></span>
                <span class="chat-user" id="chatUserName">Общий чат <i class="fas fa-hashtag" style="font-size: 14px; color: #e8a838; margin-left: 6px;"></i></span>
            </div>
            <div class="messages-area" id="messagesArea">
                <div class="message system">📢 Добро пожаловать в общий чат KoreX!</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="msgInput" placeholder="Сообщение...">
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <!-- Плавающая кнопка создания -->
        <div class="floating-add" id="addChatBtn"><i class="fas fa-plus"></i></div>
    </div>

    <!-- Нижняя навигация -->
    <div class="bottom-nav">
        <i class="fas fa-list-ul active" id="navChats"></i>
        <i class="fas fa-users" id="navContacts"></i>
        <i class="fas fa-phone-alt" id="navCalls"></i>
        <i class="fas fa-cog" id="navSettings"></i>
    </div>
</div>

<!-- Модальное окно создания чата -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <h3><i class="fas fa-plus-circle" style="margin-right: 8px;"></i>Создать чат</h3>
        <input type="text" id="newChatName" placeholder="Название чата...">
        <select id="chatTypeSelect">
            <option value="chat">💬 Чат</option>
            <option value="group">👥 Группа</option>
        </select>
        <div class="modal-actions">
            <button class="btn-cancel" id="modalCancel">Отмена</button>
            <button class="btn-confirm" id="modalConfirm">Создать</button>
        </div>
    </div>
</div>

<!-- Боковое меню настроек -->
<div class="settings-overlay" id="settingsOverlay"></div>
<div class="settings-panel" id="settingsPanel">
    <span class="close-settings" id="closeSettings"><i class="fas fa-times"></i></span>
    <h3><i class="fas fa-cog" style="margin-right: 10px;"></i>Настройки</h3>
    
    <div class="settings-item" id="themeToggle">
        <span><i class="fas fa-moon"></i> Тёмная тема</span>
        <div class="toggle active" id="themeSwitch"></div>
    </div>
    
    <div class="settings-item" id="notifToggle">
        <span><i class="fas fa-bell"></i> Уведомления</span>
        <div class="toggle active" id="notifSwitch"></div>
    </div>
    
    <div class="settings-item" id="clearChats">
        <span><i class="fas fa-trash"></i> Очистить чаты</span>
        <i class="fas fa-chevron-right" style="color: #5f7c9c;"></i>
    </div>
    
    <div class="settings-item" id="aboutKorex">
        <span><i class="fas fa-info-circle"></i> О KoreX</span>
        <i class="fas fa-chevron-right" style="color: #5f7c9c;"></i>
    </div>
    
    <div class="settings-item" id="logoutBtn">
        <span><i class="fas fa-sign-out-alt" style="color: #e47a4a;"></i> Выйти</span>
        <i class="fas fa-chevron-right" style="color: #5f7c9c;"></i>
    </div>
</div>

<!-- Подключаем Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<!-- Подключаем наши скрипты -->
<script src="config/firebase-config.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/chat-manager.js"></script>
<script src="js/ui-manager.js"></script>
<script src="js/app.js"></script>

</body>
</html>
